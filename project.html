<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Yeonseo Lee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f2ea;
  --bg2:#ede8de;
  --ink:#1a1712;
  --ink2:#3d3830;
  --ink3:rgba(26,23,18,0.45);
  --ink4:rgba(26,23,18,0.22);
  --accent:#9b2020;
  --accent2:#c94040;
  --serif:'Cormorant','Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans','Helvetica Neue',sans-serif;
  --line:rgba(26,23,18,0.1);
  --line2:rgba(26,23,18,0.18);
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;cursor:none;overflow-x:hidden}

/* ── CURSOR ── */
#cur{position:fixed;z-index:2147483647;pointer-events:none;width:8px;height:8px;background:var(--accent);border-radius:50%;top:0;left:0;margin:-4px 0 0 -4px;transition:width .25s,height .25s}
#cur-ring{position:fixed;z-index:2147483647;pointer-events:none;width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;top:0;left:0;margin:-18px 0 0 -18px;transition:width .5s cubic-bezier(.16,1,.3,1),height .5s cubic-bezier(.16,1,.3,1)}

/* ── CLOSE BUTTON ── */
.proj-close{
  position:fixed;top:32px;right:44px;z-index:500;
  background:none;border:1.5px solid var(--line2);
  width:40px;height:40px;cursor:none;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;color:var(--ink);
}
.proj-close:hover{background:var(--accent);border-color:var(--accent);color:white}

/* ── LAYOUT ── */
.proj-wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:start;
}
.proj-images{
  background:var(--bg);
  overflow-y:auto;
}
.proj-text{
  padding:60px 68px 80px;
  background:var(--bg);
}

/* ── TEXT STYLES ── */
.proj-eyebrow{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px;margin-top:28px;font-family:var(--sans)}
.proj-title{font-family:var(--serif);font-size:clamp(46px,6vw,90px);font-weight:200;line-height:.9;letter-spacing:-.015em;margin-bottom:40px;color:var(--ink)}
.proj-title-kr{font-family:var(--serif);font-size:18px;font-style:italic;color:var(--ink3);margin-bottom:16px}
.proj-sec{font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-top:30px;margin-bottom:9px;font-family:var(--sans)}
.proj-p{font-size:13.5px;font-weight:300;line-height:1.92;color:var(--ink2);letter-spacing:.01em;font-family:var(--sans);white-space:pre-wrap;overflow-wrap:break-word}

/* ── LOADING / ERROR ── */
.proj-loading{padding:60px 68px;font-family:var(--sans);font-size:13px;letter-spacing:.1em;color:var(--ink3)}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .proj-wrap{grid-template-columns:1fr}
  .proj-images{display:none}
  .proj-text{padding:60px 22px}
  .proj-close{top:20px;right:22px}
}
</style>
</head>
<body>

<button class="proj-close" id="btn-close" title="Close">
  <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M1 1l11 11M12 1L1 12"/>
  </svg>
</button>

<div class="proj-wrap" id="proj-wrap">
  <div class="proj-images" id="proj-images"></div>
  <div class="proj-text" id="proj-text">
    <p class="proj-loading">Loading…</p>
  </div>
</div>

<script>
/* ── CURSOR ── */
const dot = document.createElement('div'); dot.id = 'cur';
const ring = document.createElement('div'); ring.id = 'cur-ring';
document.documentElement.append(dot, ring);
let mx = -100, my = -100, rx = -100, ry = -100;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function raf() {
  dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  rx += (mx - rx) * .1; ry += (my - ry) * .1;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(raf);
})();

/* ── CLOSE BUTTON ── */
document.getElementById('btn-close').addEventListener('click', () => {
  // If opened via window.open, close the tab; otherwise go back to main
  if (window.opener) { window.close(); }
  else { window.location.href = '/'; }
});

/* ── LOAD PROJECT ── */
const params = new URLSearchParams(window.location.search);
const idx = parseInt(params.get('i') || '0');

async function loadProject() {
  try {
    const res = await fetch('/api/projects');
    const data = await res.json();
    const p = (data.projects || [])[idx];
    if (!p) {
      document.getElementById('proj-text').innerHTML =
        '<p class="proj-loading">Project not found.</p>';
      return;
    }
    renderProject(p);
  } catch (e) {
    document.getElementById('proj-text').innerHTML =
      '<p class="proj-loading">Failed to load project.</p>';
  }
}

function renderProject(p) {
  document.title = p.titleEN + ' — Yeonseo Lee';

  /* Left: images */
  const imagesEl = document.getElementById('proj-images');
  if (p.detailImages && p.detailImages.length) {
    imagesEl.innerHTML =
      `<div style="width:100%;columns:2;column-gap:4px;">` +
      p.detailImages.map(url =>
        `<img src="${url}" alt="${p.titleEN}" style="width:100%;display:block;object-fit:cover;break-inside:avoid;margin-bottom:4px;" loading="lazy">`
      ).join('') +
      `</div>`;
  }

  /* Right: text */
  const toHtml = str => str ? str.replace(/\n/g, '<br>') : '';
  document.getElementById('proj-text').innerHTML = `
    <p class="proj-eyebrow">${p.category}${p.year ? ' · ' + p.year : ''}</p>
    <h1 class="proj-title">${p.titleEN}</h1>
    ${p.titleKR ? `<p class="proj-title-kr">${p.titleKR}</p>` : ''}
    <p class="proj-sec" style="margin-top:24px;">Description</p>
    <p class="proj-p">${toHtml(p.descriptionEN)}</p>
    ${p.descriptionKR
      ? `<p class="proj-p" style="margin-top:12px;color:rgba(26,23,18,.65);">${toHtml(p.descriptionKR)}</p>`
      : ''}
  `;

  /* Match left column height to right column (font-aware) */
  const textEl  = document.getElementById('proj-text');
  imagesEl.style.height   = '0';
  imagesEl.style.overflow = 'hidden';

  document.fonts.ready.then(() => {
    requestAnimationFrame(() => {
      const rightH = textEl.offsetHeight;
      imagesEl.style.height   = rightH + 'px';
      imagesEl.style.overflow = 'auto';
      // Crop the page itself to content height — no blank space below
      document.body.style.height            = rightH + 'px';
      document.documentElement.style.height = rightH + 'px';
      document.body.style.overflow          = 'hidden';
    });
  });
}

loadProject();
</script>
</body>
</html>
